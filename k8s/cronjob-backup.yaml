apiVersion: batch/v1
kind: CronJob
metadata:
  name: omnibot-backup
  namespace: omnibot
spec:
  schedule: "0 2 * * *" # Run at 2 AM every day
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: postgres:15
            command:
            - /bin/sh
            - -c
            - "pg_dumpall -U postgres | gzip > /backups/omnibot-$(date +%Y%m%d%H%M%S).sql.gz"
            volumeMounts:
            - name: backup-storage
              mountPath: /backups
          restartPolicy: OnFailure
          volumes:
          - name: backup-storage
            persistentVolumeClaim:
              claimName: backup-pvc