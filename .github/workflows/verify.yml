name: TDD Verification Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest-json-report
        
    - name: Run TDD Verification
      run: python scripts/verify_tdd.py
      
    - name: Commit updated report
      if: github.event_name == 'push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add SPEC/omnibot-tdd-verification-report.md
        git commit -m "docs: auto-update TDD verification report" || echo "No changes to commit"
        git push
